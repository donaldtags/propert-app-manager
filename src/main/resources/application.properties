spring.application.name=PrimeNest-prop
server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/primenest_prop?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.default-property-inclusion=non_null
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=32MB
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001
app.demo.seed-data=false
app.storage.lease-documents=${LEASE_DOCUMENT_STORAGE:storage/lease-documents}
app.storage.property-photos=${PROPERTY_PHOTO_STORAGE:storage/property-photos}
app.public-base-url=${PUBLIC_BASE_URL:http://localhost:8081}
